spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chatdb
    username: chat_user
    password: chat_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-please-change-in-production}
  expiration: 86400000  # 24 часа в миллисекундах
  refresh-expiration: 604800000  # 7 дней

server:
  port: 8080
  error:
    include-message: always


# OpenAPI (Swagger) конфигурация
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  packages-to-scan: com.chat.server.controller
  paths-to-match: /api/**

# Firebase Cloud Messaging
fcm:
  service-account-file: firebase-service-account.json